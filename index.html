<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría de Carga - Rombo</title>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
        }
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
            width: 100%; 
            max-width: 400px; 
        }
        h2 { text-align: center; color: #1a73e8; }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 18px; 
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background-color: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer;
        }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .info-box {
            background: #e8f0fe;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            color: #1967d2;
        }
        .status-carga {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }
        .msg { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center; 
            display: none; 
            font-weight: bold;
        }
        .error { background: #fdecea; color: #d93025; border: 1px solid #d93025; }
        .success { background: #e6f4ea; color: #1e8e3e; border: 1px solid #1e8e3e; }
        .warning { background: #fef7e0; color: #f9ab00; border: 1px solid #f9ab00; }
    </style>
</head>
<body>

<div class="card">
    <h2>Auditoría de Carga</h2>
    <div id="estado" class="status-carga">⏳ Conectando con base de datos...</div>
    
    <div id="paso1">
        <label>Número de Ruta:</label>
        <input type="number" id="inputRuta" placeholder="Ej: 6949" inputmode="numeric">
        <button id="btnIngresar" onclick="ingresarRuta()" disabled>Ingresar</button>
    </div>

    <div id="paso2" style="display:none;">
        <div id="detalleRuta" class="info-box"></div>
        <label>¿Cuántos paquetes contaste?</label>
        <input type="number" id="inputConteo" placeholder="0" inputmode="numeric">
        <button onclick="verificar()" style="background-color: #34a853;">Verificar Conteo</button>
    </div>

    <div id="mensaje" class="msg"></div>
</div>

<script>
    const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRtpb3qw9Qrjics2Q265q7dDVhtrDeSFP-Gx_nULfNj90iOaeg47rTvQvKAK9t7davj-mIEFM3737OF/pub?output=csv";
    
    let datosApp = {};
    let rutaActual = null;
    let intentos = 0;

    // Carga los datos de Google Sheets
    async function cargarBaseDeDatos() {
        const estadoLabel = document.getElementById('estado');
        const btn = document.getElementById('btnIngresar');

        try {
            const res = await fetch(URL_CSV);
            const texto = await res.text();
            const filas = texto.trim().split(/\r?\n/);
            
            filas.slice(1).forEach(fila => {
                const columnas = fila.split(",");
                if(columnas.length >= 3) {
                    const idFull = columnas[0].trim();
                    datosApp[idFull] = {
                        driver: columnas[1].trim(),
                        cantidad: parseInt(columnas[2]),
                        muelle: columnas[3] ? columnas[3].trim() : "N/A"
                    };
                }
            });

            estadoLabel.innerText = "✅ Sistema listo";
            btn.disabled = false;
        } catch (e) {
            estadoLabel.innerText = "❌ Error de conexión";
        }
    }

    function ingresarRuta() {
        const num = document.getElementById('inputRuta').value.trim();
        const msg = document.getElementById('mensaje');
        const idEncontrado = Object.keys(datosApp).find(id => id.startsWith(num));

        if (idEncontrado) {
            rutaActual = datosApp[idEncontrado];
            intentos = 0; // Reiniciar intentos para esta ruta
            document.getElementById('paso1').style.display = 'none';
            document.getElementById('paso2').style.display = 'block';
            msg.style.display = 'none';
            
            document.getElementById('detalleRuta').innerHTML = `
                <strong>👤 Conductor:</strong> ${rutaActual.driver}<br>
                <strong>📍 Muelle:</strong> ${rutaActual.muelle}
            `;
        } else {
            msg.innerText = "❌ Ruta no encontrada.";
            msg.className = "msg error";
            msg.style.display = "block";
        }
    }

    function verificar() {
        const conteo = parseInt(document.getElementById('inputConteo').value);
        const msg = document.getElementById('mensaje');
        intentos++;

        if (conteo === rutaActual.cantidad) {
            // CASO ÉXITO
            msg.innerText = "✅ Cantidad correcta. Solicite salida a ruta.";
            msg.className = "msg success";
            msg.style.display = "block";
            document.getElementById('paso2').style.display = 'none';
        } else {
            // CASO ERROR
            if (intentos === 1) {
                // Primer error: Advertencia
                msg.innerText = "⚠️ Intento 1: Cantidad incorrecta. Verifique nuevamente.";
                msg.className = "msg warning";
                msg.style.display = "block";
                document.getElementById('inputConteo').value = ""; // Limpiar campo para reintentar
            } else {
                // Segundo error: Bloqueo
                msg.innerText = "❌ ERROR PERSISTENTE. Solicite apoyo con algun supervisor.";
                msg.className = "msg error";
                msg.style.display = "block";
                document.getElementById('paso2').style.display = 'none';
            }
        }
    }

    window.onload = cargarBaseDeDatos;
</script>

</body>
</html>
